<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takt — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#25a18e',
        'primary-dark': '#1e8a79',
        foreground: '#171717',
        muted: '#737373',
        border: '#e6e6e6',
        surface: '#fafafa',
      },
      fontFamily: {
        heading: ['Montserrat', 'Noto Sans JP', 'sans-serif'],
        body: ['Noto Sans JP', 'sans-serif'],
      },
      borderRadius: { xl: '1rem' },
      boxShadow: {
        soft: '0 2px 15px -3px rgba(0,0,0,0.07), 0 10px 20px -2px rgba(0,0,0,0.04)',
        'soft-lg': '0 10px 40px -10px rgba(0,0,0,0.1)',
      },
    }
  }
}
</script>
</head>
<body class="bg-surface font-body text-foreground min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center gap-2 text-foreground mb-2">
      <svg viewBox="0 0 40 48" fill="none" class="h-8 w-auto inline-block">
        <line x1="4" y1="3" x2="14" y2="46" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="12" y1="1" x2="16.5" y2="46" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="20" y1="0" x2="20" y2="46" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="28" y1="1" x2="23.5" y2="46" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="36" y1="3" x2="26" y2="46" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
      </svg>
      <span class="text-2xl font-heading font-semibold tracking-tight">Takt</span>
    </div>
    <p class="text-sm text-muted">AI Chief of Staff</p>
  </div>

  <!-- Login Card -->
  <div class="bg-white rounded-xl shadow-soft p-8">
    <form id="login-form" onsubmit="return login(event)">
      <div class="mb-4">
        <label for="email" class="block text-xs font-medium text-muted mb-1.5 uppercase tracking-wide">Email</label>
        <input type="email" id="email" required autofocus
          class="w-full px-3.5 py-2.5 border border-border rounded-lg text-sm font-body focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
      </div>
      <div class="mb-6">
        <label for="password" class="block text-xs font-medium text-muted mb-1.5 uppercase tracking-wide">Password</label>
        <input type="password" id="password" required
          class="w-full px-3.5 py-2.5 border border-border rounded-lg text-sm font-body focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
      </div>
      <button type="submit" id="submit-btn"
        class="w-full py-2.5 bg-gradient-to-r from-emerald-500 to-primary text-white rounded-lg text-sm font-medium shadow-soft hover:shadow-soft-lg transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
        Log in
      </button>
      <p class="text-sm text-red-500 mt-3 hidden" id="error"></p>
    </form>
  </div>

  <p class="text-center text-xs text-muted mt-6">Powered by Sasara, Inc.</p>
</div>

<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById("submit-btn");
  const err = document.getElementById("error");
  err.classList.add("hidden");
  btn.disabled = true;
  try {
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      }),
    });
    if (!res.ok) {
      const data = await res.json();
      err.textContent = data.detail || "Login failed";
      err.classList.remove("hidden");
      return false;
    }
    const data = await res.json();
    window.location.href = data.redirect || "/";
  } catch { err.textContent = "Network error"; err.classList.remove("hidden"); }
  finally { btn.disabled = false; }
  return false;
}
</script>
</body>
</html>
