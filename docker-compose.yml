services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: takt
      POSTGRES_USER: takt
      POSTGRES_PASSWORD: takt-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takt"]
      interval: 5s
      timeout: 3s
      retries: 5

  takt:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./templates:/app/templates
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - TAKT_DATA_DIR=/data/tenants
      - DATABASE_URL=postgresql://takt:takt-dev@db:5432/takt
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
