services:
  takt:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./templates:/app/templates
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - TAKT_DATA_DIR=/data/tenants
      - TAKT_PLATFORM_DB=/data/platform.db
    restart: unless-stopped
